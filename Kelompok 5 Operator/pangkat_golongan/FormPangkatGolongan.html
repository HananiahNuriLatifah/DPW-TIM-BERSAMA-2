<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Pangkat dan Golongan</title>
    <link rel="stylesheet" href="Form.css">
</head>

<body>
<h2> Form Pangkat dan Golongan</h2>

<form onsubmit="return validasiForm()">

    <label>Status Pegawai:</label><br>
    <select id="status" onchange="tampilkanForm()" required>
        <option value="">-- Pilih Status --</option>
        <option value="dosen">Dosen</option>
        <option value="tendik">Tendik</option> 
    </select><br><br>
    
    <div id="formDosen" style="display:none;">
        <fieldset>
            <legend><strong>Data Dosen</strong></legend>

            <label>Nama Lengkap:</label><br>
            <input type="text" id="nama_dosen" name="nama_dosen"><br>
            <small id="error_nama_dosen" style="color:red;"></small><br><br>

            <label>NIP/NIDN:</label><br>
            <input type="text" id="nip_dosen" name="nip_dosen"><br>
            <small id="error_nip_dosen" style="color:red;"></small><br><br>

            <label>Pangkat Fungsional:</label><br>
            <select name="pangkat_dosen">
                <option value="">-- Pilih --</option>
                <option>Asisten Ahli</option>
                <option>Lektor</option>
                <option>Lektor Kepala</option>
                <option>Guru Besar</option>
            </select><br><br>

            <label>Golongan:</label><br>
            <select name="golongan_dosen">
                <option value="">-- Pilih --</option>
                <option>III/a</option>
                <option>III/b</option>
                <option>III/c</option>
                <option>IV/a</option>
                <option>IV/b</option>
            </select><br><br>

            <label>TMT:</label><br>
            <input type="date" name="tmt_dosen"><br><br>

            <label>Upload SK:</label><br>
            <input type="file" id="sk_dosen" name="sk_dosen" accept=".pdf,.doc,.docx">
            <small id="error_file_dosen" style="color:red;"></small>
        </fieldset>
    </div>

    <div id="formTendik" style="display:none;">
        <fieldset>
            <legend><strong>Data Tendik</strong></legend>

            <label>Nama Lengkap:</label><br>
            <input type="text" id="nama_tendik" name="nama_tendik"><br>
              <small id="error_nama_tendik" style="color:red;"></small><br><br>
          

            <label>NIP:</label><br>
            <input type="text" id="nip_tendik" name="nip_tendik"><br>
            <small id="error_nip_tendik" style="color:red;"></small><br><br>
            <label>Golongan:</label><br>
            <select name="golongan_tendik">
                <option value="">-- Pilih --</option>
                <option>II/a</option>
                <option>II/b</option>
                <option>III/a</option>
                <option>III/b</option>
                <option>IV/a</option>
            </select><br><br>

            <label>TMT:</label><br>
            <input type="date" name="tmt_tendik"><br><br>

            <label>Upload SK:</label><br>
            <input type="file" id="sk_tendik" name="sk_tendik" accept=".pdf,.doc,.docx">
            <small id="error_file_tendik" style="color:red;"></small>
        </fieldset>
    </div>

    <br>
    <button type="submit">Simpan</button> 
    <button type="reset" onclick="return konfirmasiReset()">Batal</button>
    <button type="button" onclick="kembaliHalaman()">Kembali</button>

</form>

<script src="FormPangkatGolongan.js"></script>

</body>
</html>
